<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NFL Mock Draft Challenge 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ── TOKENS ── */
:root{
  --bg:#f5f5f0;--surface:#fff;--s2:#f8f8f5;--s3:#efefea;
  --border:#e5e5e0;--border2:#d0d0c8;
  --accent:#1a56db;--accent2:#e04a1a;
  --gold:#b8860b;--silver:#6b7280;--bronze:#92400e;
  --green:#15803d;--amber:#b45309;--red:#dc2626;
  --text:#0f0f14;--text2:#374151;--muted:#6b7280;
  --df:'Barlow Condensed',sans-serif;--bf:'Barlow',sans-serif;--r:8px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--bf);background:var(--bg);color:var(--text);font-size:15px;line-height:1.5;}

/* ── LAYOUT ── */
header{background:var(--surface);border-bottom:2px solid var(--border);padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:200;}
.nav-tabs{background:var(--surface);border-bottom:1px solid var(--border);padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;overflow-x:auto;scrollbar-width:none;}
.nav-tabs::-webkit-scrollbar{display:none;}
.nav-tabs-btns{display:flex;align-items:center;gap:8px;flex-shrink:0;padding:8px 0 8px 12px;}
.main{padding:1.25rem 1.5rem;}
/* Two-column: leaderboard col | board+avail col */
.col3{display:grid;grid-template-columns:minmax(0,340px) minmax(0,1fr);gap:1.25rem;align-items:start;}
/* Inside the right column: board and avail side by side */
.board-avail-col{display:flex;flex-direction:column;gap:1.25rem;}
.board-avail-top{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,220px);gap:1.25rem;align-items:start;}
/* Rules stretches full width of the right column */
.board-avail-col .rules-card{margin-top:0;}
/* Tablet: stack left col above right col, board+avail stay side by side */
@media(max-width:900px){
  .col3{grid-template-columns:1fr;}
  .board-avail-top{grid-template-columns:1fr 1fr;}
}
/* Mobile: single column, best available moves to bottom */
@media(max-width:600px){
  .col3{grid-template-columns:1fr;}
  .board-avail-top{display:flex;flex-direction:column;}
  .board-avail-top .panel:last-child{order:99;} /* best available last */
  header{height:auto;padding:.75rem 1rem;flex-wrap:wrap;gap:6px;}
  .site-title{font-size:18px;}
  .main{padding:.75rem;}
  .scrollable{max-height:none !important;}
  /* Participants stat cards: single row, compact on mobile */
  .stat-cards-grid{grid-template-columns:repeat(3,1fr) !important;}
  .stat-card{padding:10px 12px;}
  .stat-value{font-size:28px !important;}
  /* Participant pick row: tighter on mobile */
  .pp-row{grid-template-columns:24px 28px 1fr 44px 50px;gap:5px;padding:8px 10px;}
  /* Admin: single column */
  .admin-two-col{grid-template-columns:1fr !important;}
}

/* ── REFRESH INDICATOR ── */
.sync-dot{display:inline-flex;align-items:center;gap:5px;font-family:var(--df);font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);}
.sync-dot .sdot{width:6px;height:6px;border-radius:50%;background:var(--border2);flex-shrink:0;transition:background .4s;}
.sync-dot.synced .sdot{background:var(--green);box-shadow:0 0 5px rgba(21,128,61,.4);}
.sync-dot.synced{color:var(--green);}

/* ── STATS PANEL ── */
.stats-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-top:.75rem;overflow:hidden;}
.stats-header{padding:8px 14px;border-bottom:1px solid var(--border);background:var(--s3);}
.stats-title{font-family:var(--df);font-size:11px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--text);}
.stats-body{padding:10px 14px;display:flex;flex-direction:column;gap:10px;}
.stats-row{display:flex;flex-direction:column;gap:3px;}
.stats-label{font-size:11px;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:.06em;font-family:var(--df);}
.stats-numbers{display:flex;align-items:baseline;justify-content:space-between;}
.stats-big{font-family:var(--df);font-size:20px;font-weight:800;color:var(--text);line-height:1;}
.stats-pct{font-family:var(--df);font-size:16px;font-weight:800;color:var(--text2);}
.stats-sub{font-size:13px;color:var(--muted);}
.stats-bar{height:4px;background:var(--s3);border-radius:3px;overflow:hidden;margin-top:3px;}
.stats-bar-fill{height:100%;border-radius:3px;transition:width .4s;}
.stats-bar-fill.green{background:var(--green);}
.stats-bar-fill.blue{background:var(--accent);}


.site-title{font-family:var(--df);font-size:24px;font-weight:800;letter-spacing:.03em;text-transform:uppercase;color:var(--text);}
.live-dot{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700;color:var(--muted);letter-spacing:.07em;text-transform:uppercase;}
.live-dot .dot{width:8px;height:8px;border-radius:50%;background:var(--muted);flex-shrink:0;}
.live-dot.live .dot{background:var(--green);box-shadow:0 0 7px rgba(21,128,61,.5);animation:pulse 2s infinite;}
.live-dot.live{color:var(--green);}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}

/* ── NAV ── */
.nav-tab{font-family:var(--df);font-size:14px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);padding:12px 20px;cursor:pointer;border:none;background:none;border-bottom:3px solid transparent;white-space:nowrap;transition:color .15s,border-color .15s;}
.nav-tab:hover{color:var(--text);}
.nav-tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.nav-tab.admin-tab.active{color:var(--accent2);border-bottom-color:var(--accent2);}

/* ── PANEL ── */
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.ph{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--s3);}
.ph-title{font-family:var(--df);font-size:12px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--text);}
.ph-badge{font-family:var(--df);font-size:12px;font-weight:700;color:var(--muted);background:var(--s3);border:1px solid var(--border);border-radius:4px;padding:2px 8px;}
.scrollable{overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border2) transparent;}
.scrollable::-webkit-scrollbar{width:4px;}
.scrollable::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.empty-state{padding:2rem;text-align:center;color:var(--muted);font-size:14px;}

/* ── LEADERBOARD ── */
.lb-table{width:100%;border-collapse:collapse;}
.lb-table th{font-family:var(--df);font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:9px 14px;border-bottom:1px solid var(--border);text-align:left;background:var(--s2);}
.lb-table td{padding:11px 14px;border-bottom:1px solid var(--border);vertical-align:middle;}
.lb-table tr:last-child td{border-bottom:none;}
.lb-table tr:hover td{background:var(--s2);}
.lb-table tr{cursor:pointer;}
.lb-rank{font-family:var(--df);font-size:20px;font-weight:800;}
.rank-1{color:var(--gold);}  .rank-2{color:var(--silver);}  .rank-3{color:var(--bronze);}  .rank-n{color:var(--muted);}
.lb-pts{font-family:var(--df);font-size:28px;font-weight:800;line-height:1;color:var(--green);}
.lb-max{font-family:var(--df);font-size:14px;font-weight:600;color:var(--muted);}
.lb-correct{font-family:var(--df);font-size:20px;font-weight:800;color:var(--text);}

/* ── PRIZE POOL ── */
.pot-card{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);margin-top:.75rem;overflow:hidden;}
.pot-header{padding:8px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--s3);}
.pot-title{font-family:var(--df);font-size:11px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--text);}
.pot-body{padding:6px 14px 10px;}
.pot-row{display:flex;justify-content:space-between;align-items:baseline;padding:5px 0;border-bottom:1px solid var(--border);}
.pot-row:last-child{border-bottom:none;}
.pot-label{font-size:12px;color:var(--muted);font-weight:500;}
.pot-value{font-family:var(--df);font-size:15px;font-weight:700;color:var(--text2);}
.pot-value.hi{color:var(--gold);}
.pot-total{display:flex;justify-content:space-between;align-items:baseline;padding:7px 0 2px;border-top:1px solid var(--border2);margin-top:2px;}
.pot-total .pot-label{font-size:13px;font-weight:600;color:var(--text2);}
.pot-total .pot-value{font-size:17px;}

/* ── RULES CARD ── */
.rules-card{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);margin-top:.75rem;overflow:hidden;}
.rules-header{padding:8px 14px;border-bottom:1px solid var(--border);}
.rules-title{font-family:var(--df);font-size:11px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);}
.rules-body{padding:10px 14px;display:flex;flex-direction:column;gap:8px;}
.rule{display:flex;gap:8px;align-items:flex-start;font-size:12px;color:var(--text2);line-height:1.5;}
.rule-badge{font-family:var(--df);font-size:12px;font-weight:800;flex-shrink:0;min-width:22px;height:22px;border-radius:4px;display:inline-flex;align-items:center;justify-content:center;}
.rule-badge.pts{background:var(--accent);color:#fff;}
.rule-badge.zero{background:var(--s3);color:var(--muted);border:1px solid var(--border);}
.rule-badge.void{background:rgba(220,38,38,.1);color:var(--red);border:1px solid rgba(220,38,38,.2);}
.rule-badge.info{background:var(--s3);color:var(--text2);border:1px solid var(--border);font-size:13px;}
.rule-text{flex:1;}
.rule-sub{margin-top:5px;padding:6px 8px;background:var(--surface);border-left:2px solid var(--border2);border-radius:0 4px 4px 0;font-size:11px;color:var(--muted);line-height:1.5;}

/* ── ON THE CLOCK ── */
.otc-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-top:.75rem;overflow:hidden;}
.otc-header{padding:10px 14px;border-bottom:1px solid var(--border);background:var(--s3);display:flex;align-items:center;}
.otc-title{font-family:var(--df);font-size:12px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--text);}
.otc-row{display:flex;align-items:center;gap:8px;padding:8px 14px;border-bottom:1px solid var(--border);transition:background .1s;}
.otc-row:last-child{border-bottom:none;}
.otc-row:hover{background:var(--s2);}
.otc-name{font-size:14px;font-weight:600;}
.otc-player{font-size:13px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.otc-pts{font-family:var(--df);font-size:18px;font-weight:800;text-align:right;}
.otc-pts.v3{color:var(--green);}  .otc-pts.v1{color:var(--amber);}  .otc-pts.v0{color:#d1d5db;}

/* ── DRAFT BOARD ── */
.pick-row{display:grid;grid-template-columns:10px 30px 38px 1fr 58px;gap:8px;align-items:center;padding:9px 12px;border-bottom:1px solid var(--border);transition:background .1s;}
.pick-row:last-child{border-bottom:none;}
.pick-row:hover{background:var(--s2);}
.pick-row.on-clock{background:rgba(26,86,219,.05);box-shadow:inset 3px 0 0 var(--accent);}
.pick-num{font-family:var(--df);font-size:16px;font-weight:800;color:var(--muted);text-align:right;}
.pick-name{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pick-empty{font-size:13px;color:var(--muted);font-style:italic;}
.clock-lbl{font-family:var(--df);font-size:12px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);}
.trade-tag{font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--accent2);background:rgba(224,74,26,.09);border:1px solid rgba(224,74,26,.22);border-radius:3px;padding:1px 5px;display:inline-block;margin-top:1px;}

/* ── POSITION BADGES ── */
.pos{display:inline-block;padding:3px 7px;border-radius:4px;font-family:var(--df);font-size:11px;font-weight:800;white-space:nowrap;border:1px solid transparent;}
.pos-QB{background:#dbeafe;color:#1e40af;border-color:#bfdbfe;}
.pos-WR{background:#ede9fe;color:#5b21b6;border-color:#ddd6fe;}
.pos-RB{background:#dcfce7;color:#166534;border-color:#bbf7d0;}
.pos-TE{background:#fef3c7;color:#92400e;border-color:#fde68a;}
.pos-OT{background:#e0f2fe;color:#075985;border-color:#bae6fd;}
.pos-IOL{background:#f0f9ff;color:#0c4a6e;border-color:#e0f2fe;}
.pos-DL,.pos-DT{background:#fee2e2;color:#991b1b;border-color:#fecaca;}
.pos-EDGE{background:#ffedd5;color:#9a3412;border-color:#fed7aa;}
.pos-LB{background:#fef9c3;color:#854d0e;border-color:#fef08a;}
.pos-CB{background:#f0fdf4;color:#14532d;border-color:#bbf7d0;}
.pos-S{background:#ecfdf5;color:#064e3b;border-color:#a7f3d0;}
.pos-ATH{background:#f9fafb;color:#374151;border-color:#e5e7eb;}

/* ── BEST AVAILABLE ── */
.avail-filter-row{display:flex;gap:8px;align-items:center;padding:8px 12px;border-bottom:1px solid var(--border);background:var(--s2);}
.avail-filter-label{font-family:var(--df);font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);white-space:nowrap;}
.avail-filter-select{flex:1;padding:5px 8px;border:1px solid var(--border2);border-radius:5px;font-family:var(--df);font-size:13px;font-weight:700;background:var(--surface);color:var(--text);outline:none;cursor:pointer;}
.avail-filter-select:focus{border-color:var(--accent);}
.avail-search{width:100%;padding:10px 14px;background:var(--s2);border:none;border-bottom:1px solid var(--border);color:var(--text);font-family:var(--bf);font-size:14px;outline:none;}
.avail-search::placeholder{color:var(--muted);}
.avail-row{display:flex;align-items:center;gap:9px;padding:8px 14px;border-bottom:1px solid var(--border);transition:background .1s;}
.avail-row:last-child{border-bottom:none;}
.avail-row:hover{background:var(--s2);}
.avail-row.dragging{opacity:.3;}
.avail-name{font-size:14px;font-weight:500;flex:1;}

/* ── PARTICIPANT TAB ── */
.p-subnav{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:1.25rem;}
.p-btn{cursor:pointer;border:2px solid transparent;background:transparent;border-radius:7px;padding:2px;transition:border-color .12s;}
.p-btn:hover{border-color:var(--border2);}
.p-btn.active{border-color:var(--text2);}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 20px;}
.stat-label{font-family:var(--df);font-size:12px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:4px;}
.stat-value{font-family:var(--df);font-size:40px;font-weight:800;line-height:1.1;}
.pp-row{display:grid;grid-template-columns:30px 34px 1fr 58px 64px;gap:8px;align-items:center;padding:9px 14px;border-bottom:1px solid var(--border);transition:background .1s;}
.pp-row:hover{background:var(--s2);}
.pp-row:last-child{border-bottom:none;}
.pp-row.r3{background:rgba(21,128,61,.04);}
.pp-row.r1{background:rgba(180,83,9,.04);}
.pp-name{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pp-reason{font-size:11px;color:var(--muted);margin-top:1px;}
.pp-pts{font-family:var(--df);font-weight:800;font-size:26px;line-height:1;text-align:right;}
.pp-pts.v3{color:var(--green);}  .pp-pts.v1{color:var(--amber);}  .pp-pts.v0,.pp-pts.vn{color:#d1d5db;}
.pp-max{font-family:var(--df);font-size:12px;font-weight:600;color:var(--muted);display:block;text-align:right;}

/* ── HEADER BUTTONS ── */
.btn-form{display:inline-flex;align-items:center;gap:6px;padding:6px 11px;border-radius:6px;font-family:var(--df);font-size:12px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;text-decoration:none;border:1px solid var(--border2);color:var(--text2);background:var(--surface);transition:all .15s;white-space:nowrap;}
.btn-form:hover{background:var(--s3);border-color:var(--text2);}
.btn-venmo{display:inline-flex;align-items:center;gap:6px;padding:6px 11px;border-radius:6px;font-family:var(--df);font-size:12px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;text-decoration:none;border:1px solid #008CFF;color:#008CFF;background:rgba(0,140,255,.06);transition:all .15s;white-space:nowrap;}
.btn-venmo:hover{background:#008CFF;color:#fff;}
@media(max-width:700px){
  .btn-form .btn-label,.btn-venmo .btn-label{display:none;}
  .btn-form,.btn-venmo{padding:6px 8px;}
}


.admin-gate{display:flex;align-items:center;justify-content:center;min-height:300px;}
.admin-gate-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:2rem;width:100%;max-width:380px;}
.gate-title{font-family:var(--df);font-size:22px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:var(--accent2);margin-bottom:1.25rem;}
.section-title{font-family:var(--df);font-size:13px;font-weight:800;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);margin-bottom:.6rem;padding-bottom:.5rem;border-bottom:1px solid var(--border);}
.section{margin-bottom:1.5rem;}
input[type=password],input[type=text],select,textarea{width:100%;padding:8px 11px;background:var(--surface);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-family:var(--bf);font-size:14px;outline:none;transition:border-color .15s;}
input:focus,select:focus,textarea:focus{border-color:var(--accent);}
textarea{min-height:110px;resize:vertical;font-size:13px;}
.flabel{font-family:var(--df);font-size:11px;font-weight:800;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);margin-bottom:4px;display:block;}
.fgroup{margin-bottom:10px;}
.btn{padding:9px 18px;border-radius:6px;font-family:var(--df);font-size:13px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;border:1px solid var(--border2);background:var(--surface);color:var(--text2);transition:all .15s;}
.btn:hover{background:var(--s2);}
.btn-accent{background:var(--accent);color:#fff;border-color:var(--accent);}
.btn-accent:hover{background:#1344b8;}
.btn-orange{background:var(--accent2);color:#fff;border-color:var(--accent2);}
.btn-orange:hover{background:#c0420f;}
.btn-danger{color:var(--red);border-color:rgba(220,38,38,.3);background:transparent;}
.btn-danger:hover{background:rgba(220,38,38,.07);}
.btn-sm{padding:4px 9px;font-size:11px;}
.alert-ok{padding:10px 14px;border-radius:6px;font-size:14px;margin-bottom:1rem;background:#dcfce7;border:1px solid #bbf7d0;color:var(--green);}
.pw-error{color:var(--red);font-size:13px;margin-top:7px;min-height:18px;}
.admin-slot{display:grid;grid-template-columns:28px 72px 1fr 56px 58px auto;gap:6px;align-items:center;padding:5px 10px;border-bottom:1px solid var(--border);transition:background .15s;}
.admin-slot:last-child{border-bottom:none;}
.admin-slot.drop-over{background:#dbeafe;outline:2px dashed var(--accent);outline-offset:-2px;border-radius:4px;}
.team-select{width:100%;padding:4px 5px;background:var(--s2);border:1px solid var(--border2);border-radius:5px;color:var(--text);font-family:var(--df);font-size:12px;font-weight:700;outline:none;cursor:pointer;}
.team-select:focus{border-color:var(--accent);}
.trade-cb{display:flex;align-items:center;gap:4px;white-space:nowrap;}
.trade-cb input[type=checkbox]{width:auto;padding:0;border:none;outline:none;cursor:pointer;margin:0;accent-color:var(--accent2);}
.trade-cb label{font-size:11px;color:var(--muted);font-family:var(--df);font-weight:700;letter-spacing:.05em;cursor:pointer;text-transform:uppercase;}
</style>
</head>
<body>

<header>
  <span class="site-title">NFL Mock Draft Challenge 2026</span>
  <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;justify-content:flex-end">
    <div class="sync-dot" id="sync-dot"><span class="sdot"></span><span id="sync-label">Syncing…</span></div>
    <div id="countdown" style="font-family:var(--df);font-size:12px;font-weight:700;color:var(--muted);letter-spacing:.04em"></div>
    <div class="live-dot" id="live-dot"><span class="dot"></span><span id="live-label">Pre-draft</span></div>
  </div>

function sanitizeState(s){
  if(!Array.isArray(s.slots))        s.slots = DRAFT_ORDER.map(d=>({pick:d.pick,team:d.team,player:"",pos:"",isTrade:false,tradeNote:"",overrides:{}}));
  if(!Array.isArray(s.participants)) s.participants = [];
  if(!s.entryFee)                    s.entryFee = 50;
  s.slots.forEach(sl=>{ if(!sl.overrides) sl.overrides={}; });
  s.participants.forEach(p=>{ if(!Array.isArray(p.picks)) p.picks=[]; });
  return s;
}

// Load initial state from Worker; fall back to localStorage while loading
async function initState(){
  // Show localStorage state immediately so the page isn't blank
  try {
    const local = JSON.parse(localStorage.getItem(SK)||'{}');
    if(local.slots) { state = sanitizeState(local); renderAll(); }
  } catch{}

  // Then fetch from Worker and update if different
  try {
    const res = await fetch(`${WORKER_URL}/state`);
    const data = await res.json();
    setSynced(true);
    if(!data.empty && data.slots){
      state = sanitizeState(data);
      localStorage.setItem(SK, JSON.stringify(state));
      renderAll();
    }
  } catch(e){
    setSynced(false);
    console.warn('Could not reach Worker, using localStorage:', e);
  }
}

        'X-Commissioner-Key': commissionerKey,

      body: JSON.stringify(state),

  }
}

function posBadge(pos){

function teamBadge(team, size=34){

  const fs = size<=28 ? 11 : 13;
  return `<span style="display:inline-flex;align-items:center;justify-content:center;width:${size}px;height:${size}px;border-radius:5px;background:${bg};border:2px solid ${bd};font-family:var(--df);font-size:${fs}px;font-weight:800;color:#fff;flex-shrink:0;letter-spacing:-.02em">${team}</span>`;
}

function getDraftedSet(){ return new Set(state.slots.filter(s=>s.player).map(s=>norm(s.player))); }
function getAvail(){ const d=getDraftedSet(); return ALL_PLAYERS.filter(p=>!d.has(norm(p.name))); }

// Participant name — plain text, no color badge
function participantTag(name, size="md"){
  const fs = size==="sm" ? "13px" : "15px";
  const fw = size==="sm" ? "600" : "700";
  return `<span style="font-size:${fs};font-weight:${fw};color:var(--text)">${name}</span>`;
}

// ─────────────────────────────────────────────────────────────────
// SCORING
// ─────────────────────────────────────────────────────────────────
function scoreParticipant(p){
  if(!p || !Array.isArray(p.picks)) return {name:p?.name||"", total:0, maxPts:0, pickScores:[]};
  const drafted = getDraftedSet();
  const byPick  = {};
  state.slots.forEach(s=>{ byPick[s.pick]=s; });

  const allMocked = p.picks.map(pk=>norm(pk.player));
  const dupes     = new Set(allMocked.filter((v,i,a)=>v&&a.indexOf(v)!==i));

  let total=0, maxPts=0;

  const pickScores = p.picks.map(pk=>{
    const pn   = norm(pk.player);
    const slot = byPick[pk.pick];

    if(dupes.has(pn))
      return {...pk, pts:0, maxPts:0, reason:"void — duplicate mock"};

    if(slot?.player){
      const ovKey = `${pk.pick}_${norm(p.name)}`;
      const ov    = slot.overrides?.[ovKey];
      let pts, reason;

      if(ov !== undefined){
        pts=ov; reason="manual override";
      } else if(norm(slot.player)===pn && slot.team===pk.team){
        pts=3; reason="correct player + team ✓";
      } else if(norm(slot.player)===pn){
        pts=1; reason="correct player, team traded";
      } else if(slot.team===pk.team && slot.pos===pk.pos){
        pts=1; reason="correct position, wrong player 〜";
      } else {
        pts=0; reason="";
      }

      total+=pts; maxPts+=pts;
      return {...pk, pts, maxPts:pts, reason};
    }

    // Not yet decided
    const mp = !pn ? 0 : drafted.has(pn) ? 1 : 3;
    maxPts += mp;
    return {...pk, pts:null, maxPts:mp, reason: (drafted.has(pn)&&pn) ? "player already drafted elsewhere" : ""};
  });

  return {name:p.name, total, maxPts, pickScores};
}

function getAllScores(){
  return state.participants
    .map(p=>scoreParticipant(p))
    .sort((a,b)=>b.total-a.total || b.maxPts-a.maxPts || a.name.localeCompare(b.name));
}

// ─────────────────────────────────────────────────────────────────
// PAYOUT
// ─────────────────────────────────────────────────────────────────
function getPayout(){
  const n   = state.participants.length;
  const fee = state.entryFee || 50;
  const pot = n * fee;
  const payouts = n<=5
    ? [{place:"1st",pct:1.0}]
    : n<=9
      ? [{place:"1st",pct:0.75},{place:"2nd",pct:0.25}]
      : [{place:"1st",pct:0.65},{place:"2nd",pct:0.25},{place:"3rd",pct:0.10}];
  return {pot, fee, payouts};
}

    const otcRowsHtml = otcRows.map(r=>{
      const pc = r.pts===3?"v3":r.pts===1?"v1":"v0";

        ? `<div class="otc-pts ${pc}">${r.pts}</div>`

      const playerEl = r.player==="—"
        ? `<span style="color:var(--muted);font-style:italic">No pick</span>`

            ${r.player}${r.pos?` <span style="color:var(--muted);font-size:11px">${r.pos}</span>`:""}

        <div style="width:110px;flex-shrink:0">${participantTag(r.name,"sm")}</div>

      </div>`;
    }).join("");
    otcHtml = `<div class="otc-panel">
      <div class="otc-header">
        ${teamBadge(nextSlot.team,28)}
        <span class="otc-title" style="flex:1;margin-left:10px">On the Clock — Pick ${nextSlot.pick}</span>

      </div>
      ${otcRowsHtml||`<div class="empty-state">No participants yet.</div>`}
    </div>`;
  }

  // Stats panel — always visible, shows zeroes pre-draft
  const decidedSlots = state.slots.filter(s=>s.player).length;
  const allPickScores = decidedSlots > 0 ? state.participants.flatMap(p=>scoreParticipant(p).pickScores.filter(pk=>pk.pts!==null)) : [];
  const totalResolved  = allPickScores.length;
  const correctPicks   = allPickScores.filter(pk=>pk.pts===3).length;
  const totalPtsEarned = allPickScores.reduce((s,pk)=>s+(pk.pts||0),0);
  const maxPtsPossible = decidedSlots * state.participants.length * 3;
  const pickPct  = totalResolved>0 ? Math.round(correctPicks/totalResolved*100) : 0;
  const ptsPct   = maxPtsPossible>0 ? Math.round(totalPtsEarned/maxPtsPossible*100) : 0;
  const statsHtml = `<div class="stats-card">
    <div class="stats-header"><span class="stats-title">Pool Stats</span></div>
    <div class="stats-body">
      <div class="stats-row">

        <div class="stats-label">Points Earned</div>
        <div class="stats-numbers">
          <span><span class="stats-big">${totalPtsEarned}</span> <span class="stats-sub">of ${maxPtsPossible} max</span></span>

      </div>
    </div>
  </div>`;

  // Prize pool
  const potHtml = `<div class="pot-card">
    <div class="pot-header">
      <span class="pot-title">Prize Pool</span>
      <span style="font-family:var(--df);font-size:11px;color:var(--muted)">${money(fee)} entry · ${state.participants.length} entries</span>
    </div>
    <div class="pot-body">
      <div class="pot-total"><span class="pot-label">Total pot</span><span class="pot-value">${money(pot)}</span></div>
      ${payouts.map(p=>`<div class="pot-row"><span class="pot-label">${p.place} place</span><span class="pot-value hi">${money(Math.round(pot*p.pct))}</span></div>`).join("")}
    </div>
  </div>`;

  // Rules — improved badges, sub-bullets for examples
  const rulesHtml = `<div class="rules-card">
    <div class="rules-header"><span class="rules-title">Scoring Rules</span></div>
    <div class="rules-body">
      <div class="rule"><span class="rule-badge pts">3</span><span class="rule-text">Points for correct player (and position).</span></div>
      <div class="rule"><span class="rule-badge pts">1</span><div class="rule-text">Point for correct position but incorrect player.</div></div>
      <div class="rule"><span class="rule-badge info">⇄</span><div class="rule-text">Trades count for the team, not the draft slot.
        <div class="rule-sub">E.g.: If the Jets trade from No. 2 to No. 1 and select Fernando Mendoza, participants who mocked Mendoza to the Jets at No. 2 receive 3 pts. Participants who mocked Mendoza to the Raiders at No. 1 receive 1 pt if the Raiders select a different QB at No. 2, or 0 pts if a different position.</div>
      </div></div>
      <div class="rule"><span class="rule-badge info">i</span><div class="rule-text">Official positions are per the CBS Sports list. OT/IOL, DL/EDGE, and LB/EDGE are different positions.</div></div>
      <div class="rule"><span class="rule-badge pts">1</span><div class="rule-text">Point if a team has multiple picks and you select the correct player but in the wrong slot.
        <div class="rule-sub">E.g.: In 2023, HOU had picks No. 2 and No. 12. Participants who mocked Will Anderson to HOU at No. 2 received 1 pt when HOU selected him at No. 3. Participants who mocked Anderson to HOU at No. 12 received 3 pts.</div>
      </div></div>
      <div class="rule"><span class="rule-badge zero">0</span><div class="rule-text">If a team trades from outside the first round into the first round, that pick is null.</div></div>
      <div class="rule"><span class="rule-badge info">⇄</span><div class="rule-text">If a team trades multiple 1st round picks to move up for one pick, you receive points for correctly mocking either pick.</div></div>
      <div class="rule"><span class="rule-badge void">✕</span><div class="rule-text">If you mock the same player in multiple slots, he is void in all slots.</div></div>
    </div>

  // Draft board
  const boardHtml = state.slots.map(slot=>{
    const isNext = nextSlot && slot.pick===nextSlot.pick;
    return `<div class="pick-row${isNext?" on-clock":""}">
      <div style="display:flex;align-items:center;justify-content:center">${slot.isTrade ? `<span style="display:block;width:6px;height:6px;border-radius:50%;background:var(--accent2);flex-shrink:0" title="Trade"></span>` : ""}</div>

  // Best available
  const filtered = avail.filter(p=>{
    const matchPos  = posFilter==="ALL" || p.pos===posFilter;
    const matchName = !availFilter || p.name.toLowerCase().includes(availFilter.toLowerCase());

  const availHtml = filtered.slice(0,120).map(p=>
    `<div class="avail-row">${posBadge(p.pos)}<span class="avail-name">${p.name}</span></div>`
  ).join("") || `<div class="empty-state">No players match.</div>`;

  return `<div class="col3">
    <div>
      <div class="panel">
        <div class="ph"><span class="ph-title">Leaderboard</span><span class="ph-badge">${state.participants.length} entries</span></div>
        <div class="scrollable" style="max-height:calc(100vh - 420px)"><table class="lb-table">
          <thead><tr><th width="36">#</th><th>Participant</th><th>Pts</th><th>Max</th><th>✓</th></tr></thead>
          <tbody>${lbRows}</tbody>
        </table></div>
      </div>
      ${otcHtml}
      ${statsHtml}
      ${potHtml}
    </div>
    <div class="board-avail-col">
      <div class="board-avail-top">
        <div class="panel">
          <div class="ph"><span class="ph-title">2026 Draft Board</span></div>
          <div class="scrollable" style="max-height:calc(100vh - 185px)">${boardHtml}</div>
        </div>
        <div class="panel">
          <div class="ph"><span class="ph-title">Best Available</span></div>
          <div class="avail-filter-row">
            <span class="avail-filter-label">Pos</span>
            <select class="avail-filter-select" onchange="setPosFilter(this.value)">
              ${POS_GROUPS.map(p=>`<option value="${p}"${posFilter===p?" selected":""}>${p==="ALL"?"All":p}</option>`).join("")}

          <div class="scrollable" style="max-height:calc(100vh - 290px)">${availHtml}</div>

function viewParticipant(name){ activeParticipant=name; setTab("participants"); }
function selectParticipant(name){ activeParticipant=name; renderAll(); }

function renderParticipants(){
  const scores = getAllScores();

  // Default to first participant if none selected or selection no longer exists
  if((!activeParticipant || !scores.find(x=>x.name===activeParticipant)) && scores.length){
    activeParticipant = scores[0].name;
  }

  const subnav = `<div class="p-subnav">${
    scores.map(s=>
      `<button class="p-btn${activeParticipant===s.name?" active":""}" onclick="selectParticipant('${s.name.replace(/'/g,"\\'")}');">${participantTag(s.name,"sm")}</button>`
    ).join("")
  }</div>`;

  if(!state.participants.length)
    return subnav + `<div class="empty-state" style="padding:3rem">No participants yet.</div>`;

  const s = scores.find(x=>x.name===activeParticipant);
  if(!s) return subnav;
  const rank = scores.indexOf(s)+1;

  const rows = s.pickScores.map(pk=>{
    const decided = pk.pts !== null;
    const rc = decided&&pk.pts===3?"r3":decided&&pk.pts===1?"r1":"";
    const pc = pk.pts===3?"v3":pk.pts===1?"v1":decided?"v0":"vn";
    const reason = pk.reason || (decided && pk.pts===0 && pk.player ? "incorrect pick ✗" : "");
    return `<div class="pp-row ${rc}">
      <div class="pick-num" style="font-size:14px;font-weight:800">${pk.pick}</div>
      <div>${teamBadge(pk.team,28)}</div>
      <div style="min-width:0">
        <div class="pp-name">${pk.player||"—"}</div>
        ${reason ? `<div class="pp-reason">${reason}</div>` : ""}
      </div>
      <div>${posBadge(pk.pos)}</div>
      <div>
        <div class="pp-pts ${pc}">${decided ? pk.pts : "–"}</div>
        <span class="pp-max">max ${pk.maxPts}</span>
      </div>
    </div>`;
  }).join("");

  return `${subnav}
  <div class="stat-cards-grid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:1.25rem">
    <div class="stat-card"><div class="stat-label">Points</div><div class="stat-value">${s.total}</div></div>
    <div class="stat-card"><div class="stat-label">Max Points</div><div class="stat-value">${s.maxPts}</div></div>
    <div class="stat-card"><div class="stat-label">Rank</div><div class="stat-value">${rank}<span style="font-size:20px;color:var(--muted);font-weight:600"> of ${scores.length}</span></div></div>
  </div>
  <div class="panel">
    <div style="display:grid;grid-template-columns:30px 34px 1fr 58px 64px;gap:8px;padding:9px 14px;border-bottom:1px solid var(--border);background:var(--s2)">
      <div class="flabel" style="margin:0">#</div><div class="flabel" style="margin:0">Team</div>
      <div class="flabel" style="margin:0">Mock Pick</div><div class="flabel" style="margin:0">Pos</div>
      <div class="flabel" style="margin:0;text-align:right">Pts / Max</div>
    </div>
    ${rows}
  </div>`;
}

  const ovPickOpts = state.slots.filter(s=>s.player).map(s=>`<option value="${s.pick}">Pick ${s.pick} — ${s.team}: ${s.player}</option>`).join("");

  return `<div class="alert-ok">Commissioner mode · Auto-saves to this browser ·

          </div>
          <div class="scrollable" style="max-height:calc(100vh - 220px)">${slotRows}</div>

        <div class="panel" style="position:sticky;top:68px">
          <div class="ph"><span class="ph-title">Best Available</span><span class="ph-badge">${avail.length}</span></div>

        <div class="fgroup"><label class="flabel">Pick</label><select id="ov-pick">${ovPickOpts}</select></div>

        <button class="btn btn-accent" onclick="applyOverride()">Apply Override</button>
        <div id="ov-msg" style="font-size:13px;color:var(--green);margin-top:6px;min-height:18px"></div>

          // Build list of all active overrides across all slots
          const active = [];
          state.slots.forEach(s=>{
            if(!s.overrides) return;
            Object.entries(s.overrides).forEach(([key, pts])=>{
              // key format: pickNum_participantNormName

                    <button class="btn btn-sm btn-danger" onclick="clearOverride(${o.pick},'${o.partNorm}')">Clear</button>
                  </div>
                </div>`).join('')}
            </div>
          </div>`;
        })()}
      </div>` : ""}
    </div>
  </div>`;
}

// ─────────────────────────────────────────────────────────────────
// DRAG — player from avail list onto slot
// ─────────────────────────────────────────────────────────────────
function playerDragStart(e,name,pos){
  dragPlayerData={name,pos};
  e.dataTransfer.effectAllowed="copy";
  e.dataTransfer.setData("text/plain","player");
  setTimeout(()=>e.target.classList.add("dragging"),0);
}
function playerDragEnd(e){ e.target.classList.remove("dragging"); dragPlayerData=null; }
function slotDragOver(e,idx){ e.preventDefault(); document.getElementById(`aslot-${idx}`)?.classList.add("drop-over"); }
function slotDragLeave(idx){ document.getElementById(`aslot-${idx}`)?.classList.remove("drop-over"); }
function slotDrop(e,idx){
  e.preventDefault();
  document.getElementById(`aslot-${idx}`)?.classList.remove("drop-over");
  if(!dragPlayerData) return;
  state.slots[idx].player = dragPlayerData.name;
  state.slots[idx].pos    = dragPlayerData.pos;
  dragPlayerData = null;
  saveState(); renderAll();
}

// ─────────────────────────────────────────────────────────────────
// ADMIN ACTIONS
// ─────────────────────────────────────────────────────────────────
function tryAdminLogin(){
  const pw=document.getElementById("admin-pw")?.value;
  if(pw===ADMIN_PASS){
    adminUnlocked=true;
    commissionerKey=pw; // use the admin password as the commissioner key
    renderAll();
  }
  else{ const el=document.getElementById("pw-error"); if(el) el.textContent="Incorrect password"; }
}

function changeTeam(idx,team){ state.slots[idx].team=team; saveState(); renderAll(); }
function toggleTrade(idx,checked){ state.slots[idx].isTrade=checked; saveState(); }
function clearSlot(idx){
  Object.assign(state.slots[idx],{player:"",pos:"",isTrade:false,tradeNote:"",overrides:{}});
  saveState(); renderAll();
}
function editNote(idx){
  const n=prompt("Trade note (leave blank to clear):",state.slots[idx].tradeNote||"");
  if(n===null) return;
  state.slots[idx].tradeNote=n.trim();
  saveState(); renderAll();
}
function updateFee(v){ const n=parseInt(v); if(!isNaN(n)&&n>0){state.entryFee=n;saveState();} }

function applyOverride(){
  const pick=parseInt(document.getElementById("ov-pick")?.value);
  const part=document.getElementById("ov-part")?.value;
  const pts=parseInt(document.getElementById("ov-pts")?.value);
  const slot=state.slots.find(s=>s.pick===pick);
  if(!slot) return;
  if(!slot.overrides) slot.overrides={};
  slot.overrides[`${pick}_${part}`]=pts;
  saveState();
  const el=document.getElementById("ov-msg");
  if(el) el.textContent=`Override set: Pick ${pick} → ${part} = ${pts} pts`;
  renderAll();
}

function clearOverride(pick, partNorm){
  const slot=state.slots.find(s=>s.pick===pick);
  if(!slot||!slot.overrides) return;
  delete slot.overrides[`${pick}_${partNorm}`];
  saveState(); renderAll();
}

function addParticipant(){
  const name=document.getElementById("pname")?.value?.trim();
  const raw=document.getElementById("ppaste")?.value?.trim();
  const msg=document.getElementById("padd-msg");
  const err=t=>{ if(msg){msg.style.color="var(--red)";msg.textContent=t;} };
  const ok =t=>{ if(msg){msg.style.color="var(--green)";msg.textContent=t;} };
  if(!name) return err("Enter a name.");
  if(!raw)  return err("Paste pick data.");
  if(state.participants.find(p=>norm(p.name)===norm(name))) return err("Name already exists.");
  const picks=raw.split("\n").map(l=>l.trim()).filter(Boolean).reduce((acc,line)=>{
    const parts=line.split("\t");
    const pn=parseInt(parts[0]);
    if(!isNaN(pn)) acc.push({pick:pn,team:parts[1]?.trim()||"",player:parts[2]?.trim()||"",pos:parts[3]?.trim()||""});
    return acc;
  },[]);
  if(picks.length<20) return err(`Only ${picks.length} valid rows — expected 32.`);
  state.participants.push({name,picks});
  activeParticipant=name;
  saveState(); ok(`${name} added with ${picks.length} picks!`); renderAll();
}

function removeParticipant(idx){
  const rm=state.participants.splice(idx,1)[0];
  if(activeParticipant===rm?.name) activeParticipant=state.participants[0]?.name||"";
  saveState(); renderAll();
}

function setPosFilter(pos){ posFilter=pos; renderAll(); }

function setAvailFilter(val){
  availFilter=val; renderAll();
  setTimeout(()=>{
    const id=activeTab==="admin"?"admin-avail-search":"lb-avail-search";
    const el=document.getElementById(id);
    if(el){ el.focus(); el.setSelectionRange(val.length,val.length); }
  },10);
}

function exportState(){
  const b=new Blob([JSON.stringify(state,null,2)],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(b); a.download="nfl2026_backup.json"; a.click();
}
function importState(input){
  const file=input.files[0]; if(!file) return;
  const r=new FileReader();
  r.onload=e=>{
    try{
      const d=JSON.parse(e.target.result);
      if(d.slots&&d.participants){ state=sanitizeState(d); saveState(); renderAll(); }
    }catch{ alert("Invalid JSON file."); }
  };
  r.readAsText(file);
}

// ─────────────────────────────────────────────────────────────────
// COUNTDOWN
// ─────────────────────────────────────────────────────────────────
function updateCountdown(){
  const el=document.getElementById("countdown");
  if(!el) return;
  const diff=DRAFT_START-new Date();
  if(diff<=0){ el.innerHTML=`<span style="color:var(--green)">🏈 Draft is live!</span>`; return; }
  const d=Math.floor(diff/86400000);
  const h=Math.floor((diff%86400000)/3600000);
  const m=Math.floor((diff%3600000)/60000);
  const s=Math.floor((diff%60000)/1000);
  el.innerHTML = d>0
    ? `<span style="color:var(--muted)">Draft in</span> <span style="color:var(--text)">${d}d ${pad(h)}h ${pad(m)}m ${pad(s)}s</span>`
    : `<span style="color:var(--amber)">Draft in</span> <span style="color:var(--amber);font-size:15px">${pad(h)}:${pad(m)}:${pad(s)}</span>`;
}
setInterval(updateCountdown,1000);
updateCountdown();


function setSynced(ok){
  const el=document.getElementById("sync-dot");
  const lbl=document.getElementById("sync-label");
  if(!el||!lbl) return;
  if(ok){ el.className="sync-dot synced"; lbl.textContent="Live"; }
  else  { el.className="sync-dot"; lbl.textContent="Offline"; }
}

// ─────────────────────────────────────────────────────────────────
// AUTO-REFRESH — poll Worker every 15s so all viewers stay in sync
// ─────────────────────────────────────────────────────────────────
async function autoRefresh(){
  if(adminUnlocked) return; // commissioner is the source of truth
  try {
    const res = await fetch(`${WORKER_URL}/state`);
    const data = await res.json();
    setSynced(true);
    if(!data.empty && data.slots){
      const incoming = JSON.stringify(data);
      const current  = JSON.stringify(state);
      if(incoming !== current){
        state = sanitizeState(data);
        localStorage.setItem(SK, JSON.stringify(state));
        renderAll();
      }
    }
  } catch(e){
    setSynced(false);
    console.warn('Auto-refresh failed:', e);
  }
}
setInterval(autoRefresh, 15000);

// ─────────────────────────────────────────────────────────────────
// NAV / RENDER
// ─────────────────────────────────────────────────────────────────
const TABS=[{id:"leaderboard",label:"Leaderboard"},{id:"participants",label:"Participants"},{id:"admin",label:"Commissioner",admin:true}];

function setTab(id){ activeTab=id; renderAll(); }

function updateLiveDot(){
  const dot=document.getElementById("live-dot");
  const lbl=document.getElementById("live-label");
  if(!dot||!lbl) return;
  const n=state.slots.filter(s=>s.player).length;
  if(n===0)      { dot.className="live-dot"; lbl.textContent="Pre-draft"; }
  else if(n>=32) { dot.className="live-dot"; lbl.textContent="Draft complete"; }
  else           { dot.className="live-dot live"; lbl.textContent=`Pick ${n+1} on the clock`; }
}

function renderAll(){
  const nav=document.getElementById("nav-tabs-left");
  const content=document.getElementById("main-content");
  if(!nav||!content) return;
  // Safety net — re-init if state got corrupted
  if(!Array.isArray(state.slots))        state.slots=DRAFT_ORDER.map(d=>({pick:d.pick,team:d.team,player:"",pos:"",isTrade:false,tradeNote:"",overrides:{}}));
  if(!Array.isArray(state.participants)) state.participants=[];
  state.slots.forEach(s=>{ if(!s.overrides) s.overrides={}; });
  state.participants.forEach(p=>{ if(!Array.isArray(p.picks)) p.picks=[]; });
  nav.innerHTML=TABS.map(t=>
    `<button class="nav-tab${t.admin?" admin-tab":""}${activeTab===t.id?" active":""}" onclick="setTab('${t.id}')">${t.label}</button>`
  ).join("");
  if(activeTab==="leaderboard")       content.innerHTML=renderLeaderboard();
  else if(activeTab==="participants") content.innerHTML=renderParticipants();
  else if(activeTab==="admin")        content.innerHTML=renderAdmin();
  updateLiveDot();
}

// Boot — show page immediately from localStorage, then sync from Worker
renderAll();
initState();
</script>
</body>
</html>
